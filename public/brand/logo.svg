<svg
  width="128"
  height="128"
  viewBox="0 0 128 128"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="IAplicada"
>
  <defs>
    <!-- Soft inner glow on the white petals/diamond -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.8" result="blur" />
      <feFlood flood-color="#FFFFFF" flood-opacity="0.8" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Mask that sculpts the 4 petals + center diamond -->
    <mask id="ia-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
      <rect width="128" height="128" fill="black" />
      <!-- Outer white body — becomes the flower after cutout -->
      <circle cx="64" cy="64" r="48" fill="white" />
      <!-- Vertical + horizontal pill cutouts create the 4 petals -->
      <rect x="60" y="10" width="8" height="108" rx="4" fill="black" />
      <rect x="10" y="60" width="108" height="8" rx="4" fill="black" />
      <!-- Small diamond re-added at the very center -->
      <polygon points="64,57 71,64 64,71 57,64" fill="white" />
    </mask>
  </defs>

  <!-- Rounded olive square background -->
  <rect width="128" height="128" rx="24" fill="#8BAB23" />

  <!-- White flower + diamond with subtle glow -->
  <g filter="url(#glow)">
    <rect width="128" height="128" fill="white" mask="url(#ia-mask)" />
  </g>
</svg>
